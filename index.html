    <title>Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden
        }

        /* Shared animations */
        @keyframes blurOverlayAppear {
            0% {
                opacity: 0;
                -webkit-backdrop-filter: blur(0px);
                backdrop-filter: blur(0px);
            }

            100% {
                opacity: 1;
                -webkit-backdrop-filter: blur(12px);
                backdrop-filter: blur(12px);
            }
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9)
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px)
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px)
            }
        }

        /* Background and overlay */
        #background-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            z-index: -3 !important
        }

        #blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0, rgba(118, 75, 162, 0.15) 100%);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            z-index: -2 !important;
            animation: blurOverlayAppear 1.5s ease-out forwards .3s;
            pointer-events: none;
            opacity: 0
        }

        /* Shared page wrapper */
        .page-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1 !important;
            padding: 20px;
            overflow-y: auto
        }

        /* Shared card container */
        .card-container {
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            width: 100%;
            animation: containerAppear 1s ease-out .8s backwards;
            position: relative;
            overflow: hidden
        }

        /* Page title and icon */
        .page-header {
            margin-bottom: 35px;
            text-align: center
        }

        .page-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #faab41 0, #f6821f 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: fadeIn .8s ease-out 1s backwards
        }

        .page-icon svg {
            width: 36px;
            height: 36px;
            fill: white
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #faab41 0, #f6821f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 12px;
            line-height: 1.2;
            letter-spacing: -0.5px
        }

        /* Form styles */
        .page-form {
            display: flex;
            flex-direction: column;
            margin-top: 35px
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
            position: relative
        }

        .input-wrapper {
            position: relative
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            opacity: .4;
            pointer-events: none;
            transition: opacity .3s ease
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb !important;
            border-radius: 12px;
            font-size: 16px;
            color: #1f2937 !important;
            background-color: #fff !important;
            box-sizing: border-box;
            transition: all .3s ease;
            -webkit-appearance: none;
            appearance: none;
            font-family: inherit
        }

        .form-group input.with-icon {
            padding-left: 48px
        }

        .form-group input:focus {
            outline: 0 !important;
            border-color: #faab41 !important;
            box-shadow: 0 0 0 4px rgba(250, 171, 65, 0.1) !important
        }

        .form-group input:focus+.input-icon {
            opacity: .7
        }

        .form-group input:disabled {
            background-color: #f3f4f6 !important;
            color: #9ca3af !important;
            cursor: not-allowed;
            opacity: 1
        }

        .form-group input[readonly] {
            background-color: #f9fafb !important;
            color: #6b7280 !important
        }

        /* Button styles */
        .btn {
            padding: 16px 20px;
            border: 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            letter-spacing: .5px;
            position: relative;
            overflow: hidden
        }

        .btn-primary {
            background: linear-gradient(135deg, #faab41 0, #f6821f 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4)
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left .5s ease
        }

        .btn-primary:hover::before {
            left: 100%
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5)
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4)
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none
        }

        /* Footer note */
        .footer-hint {
            margin-top: 30px;
            font-size: 13px;
            color: #9ca3af;
            animation: fadeIn 1s ease-out 1.5s backwards;
            text-align: center
        }

        .footer-hint a {
            color: #faab41;
            text-decoration: none;
            font-weight: 500;
            transition: color .3s ease
        }

        .footer-hint a:hover {
            color: #f6821f
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000000000;
            justify-content: center;
            align-items: center
        }

        .modal-overlay.show {
            display: flex
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 2000000001;
            position: relative
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #9ca3af
        }

        .modal-close:hover {
            color: #1f2937
        }

        /* Responsive design - tablet */
        @media(max-width:768px) {
            .page-wrapper {
                padding: 20px 16px;
                padding-top: 20px;
                padding-bottom: 20px;
                justify-content: flex-start;
                align-items: center
            }

            .card-container {
                padding: 40px 28px;
                border-radius: 20px;
                max-width: 100%;
                margin-top: auto;
                margin-bottom: auto
            }

            .page-icon {
                width: 60px;
                height: 60px;
                border-radius: 16px;
                margin-bottom: 16px
            }

            .page-icon svg {
                width: 30px;
                height: 30px
            }

            .page-form {
                margin-top: 28px
            }

            .form-group {
                margin-bottom: 20px
            }

            .form-group input {
                padding: 14px;
                font-size: 16px;
                border-radius: 10px
            }

            .form-group input.with-icon {
                padding-left: 44px
            }

            .input-icon {
                left: 14px;
                width: 18px;
                height: 18px
            }

            .btn {
                padding: 15px 20px;
                font-size: 15px;
                border-radius: 10px
            }

            .footer-hint {
                margin-top: 24px;
                font-size: 12px
            }
        }

        /* Responsive design - mobile */
        @media(max-width:480px) {
            .page-wrapper {
                padding: 12px;
                justify-content: flex-start;
                align-items: center
            }

            .card-container {
                padding: 35px 24px;
                border-radius: 18px;
                margin-top: auto;
                margin-bottom: auto
            }

            .page-icon {
                width: 55px;
                height: 55px;
                border-radius: 14px
            }

            .page-icon svg {
                width: 28px;
                height: 28px
            }

            .page-title {
                font-size: 24px
            }
        }

        /* Responsive design - landscape */
        @media(max-height:600px) and (orientation:landscape) {
            .page-wrapper {
                padding: 20px;
                justify-content: flex-start;
                align-items: center
            }

            .card-container {
                padding: 30px 35px;
                margin-top: auto;
                margin-bottom: auto
            }

            .page-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 12px
            }

            .page-icon svg {
                width: 26px;
                height: 26px
            }

            .page-title {
                font-size: 22px;
                margin-bottom: 8px
            }

            .page-form {
                margin-top: 20px
            }

            .form-group {
                margin-bottom: 16px
            }

            .footer-hint {
                margin-top: 16px
            }
        }

        .card-container {
            max-width: 440px;
            text-align: center
        }

        /* Error message styles */
        .login-error {
            margin-top: 24px;
            padding: 14px 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ef4444 0, #dc2626 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            animation: errorShake 0.5s ease-in-out, fadeInError 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .login-error::before {
            content: '';
            flex-shrink: 0;
            font-size: 16px
        }

        @keyframes errorShake {

            0%,
            100% {
                transform: translateX(0)
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px)
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px)
            }
        }

        @keyframes fadeInError {
            from {
                opacity: 0;
                transform: translateY(-10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        
        .btn-loading {
            position: relative;
            color: transparent !important
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            top: 50%;
            left: 50%;
            margin-left: -7px;
            margin-top: -7px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        
        .btn-full-width {
            width: 100%;
        }

        
        .login-error-hidden {
            display: none;
        }

        
        .modal-button-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            width: 100%;
        }

        @media (max-width: 480px) {
            .modal-button-container {
                flex-direction: column;
                align-items: center;
            }

            .modal-button-container button {
                width: 100%;
                margin: 5px 0 !important;
            }
        }

        
        .btn-tech-upgrade {
            position: relative;
            overflow: hidden;
            animation: btnPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .btn-countdown-line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #fff;
            width: 100%;
            border-radius: 0 0 14px 14px;
            transform-origin: left;
            animation: countdownProgress 8s linear forwards;
            box-shadow: 0 0 8px #fff, 0 0 15px #f6821f;
            z-index: 2;
        }

        
        .btn-tech-upgrade::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg);
            animation: techScan 3s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes countdownProgress {
            from {
                transform: scaleX(1);
            }

            to {
                transform: scaleX(0);
            }
        }

        @keyframes techScan {
            0% {
                left: -60%;
            }

            30%,
            100% {
                left: 150%;
            }
        }

        @keyframes btnPulse {

            0%,
            100% {
                box-shadow: 0 8px 16px rgba(246, 130, 31, 0.2);
            }

            50% {
                box-shadow: 0 8px 25px rgba(246, 130, 31, 0.5);
            }
        }
    </style>

    outline: none !important;
}

html.edt-local-theme code,
html.edt-local-theme pre,
html.edt-local-theme .code,
html.edt-local-theme .copy-text,
html.edt-local-theme .subscription-link,
html.edt-local-theme .url-display {
    background: #f0eee6 !important;
    border: 1px solid #e8e6dc !important;
    color: #30302e !important;
    font-family: var(--edt-mono) !important;
}

html.edt-local-theme table,
html.edt-local-theme .table {
    background: var(--edt-surface) !important;
    border-color: var(--edt-border-strong) !important;
    color: var(--edt-text) !important;
}

html.edt-local-theme th,
html.edt-local-theme .table-header {
    background: #e8e6dc !important;
    color: var(--edt-text) !important;
}

html.edt-local-theme .success-message,
html.edt-local-theme .toast-success,
html.edt-local-theme .badge-success,
html.edt-local-theme .status-success {
    background: #e8e6dc !important;
    border-color: #d1cfc5 !important;
    color: #3d3d3a !important;
}

html.edt-local-theme .error-message,
html.edt-local-theme .toast-error,
html.edt-local-theme .badge-error,
html.edt-local-theme .status-error,
html.edt-local-theme .error-sub {
    background: rgba(181, 51, 51, 0.1) !important;
    border-color: rgba(181, 51, 51, 0.3) !important;
    color: var(--edt-danger) !important;
}

html.edt-local-theme .page-icon,
html.edt-local-theme .icon,
html.edt-local-theme .module-icon {
    background: #e8e6dc !important;
    background-image: none !important;
    color: var(--edt-brand) !important;
    box-shadow: 0 0 0 1px var(--edt-border-strong) !important;
}

html.edt-local-theme .page-icon svg,
html.edt-local-theme .icon svg,
html.edt-local-theme .module-icon svg {
    fill: var(--edt-brand) !important;
}

html.edt-local-theme .progress-bar,
html.edt-local-theme .cf-bar-green,
html.edt-local-theme .cf-bar-blue,
html.edt-local-theme .usage-progress,
html.edt-local-theme .bar-fill {
    background: var(--edt-brand) !important;
    background-image: none !important;
    box-shadow: none !important;
}

html.edt-local-theme .leaflet-container {
    border-radius: 24px !important;
    border: 1px solid var(--edt-border-strong) !important;
}

html.edt-local-theme .footer-hint {
    color: var(--edt-text-soft) !important;
}
</style>
</head>

<body>
    <!-- Background content -->
    <iframe id="background-iframe" src="/" title="Background content"></iframe>

    <!-- Glass overlay -->
    <div id="blur-overlay"></div>

    <!-- Login card container -->
    <div class="page-wrapper">
        <div class="card-container">
            <div class="page-header">
                <div class="page-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" />
                    </svg>
                </div>
                <h1 class="page-title">Admin Login</h1>
            </div>
            <form id="loginForm" class="page-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="with-icon" placeholder="Enter your administrator password"
                            required disabled>
                        <svg class="input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                        </svg>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full-width" id="loginBtn" disabled>Sign in</button>
                <div id="errorMsg" class="login-error login-error-hidden"></div>
            </form>
            <div class="footer-hint">
                Powered by <a href="https://github.com/cmliu/edgetunnel" target="_blank" rel="noopener">edgetunnel</a>
            </div>
        </div>
    </div>

    <!-- IR User Warning Modal -->
    <div id="ir-modal" class="modal-overlay"
        style="backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); background: rgba(0,0,0,0.7);">
        <div class="modal"
            style="z-index: 2147483647; max-width: 700px; padding: 0; border-radius: 32px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; border: none;">
            <div id="ir-modal-content"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const irModal = document.getElementById('ir-modal');
            const redirectUrl = 'https://github.com/bia-pain-bache/BPB-Worker-Panel';

            // Function to enable login
            const enableLogin = () => {
                passwordInput.removeAttribute('disabled');
                loginBtn.removeAttribute('disabled');
                passwordInput.focus();
            };

            // Check location
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000); // 3 seconds timeout

                const response = await fetch('/cdn-cgi/trace', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const text = await response.text();
                const lines = text.split('\n');
                const locLine = lines.find(line => line.startsWith('loc='));

                if (locLine && locLine.split('=')[1].trim() === 'IR') {
                    // Is IR user
                    const lang = navigator.language || navigator.userLanguage;
                    const modalContent = document.getElementById('ir-modal-content');
                    let contentHTML = '';

                    const primaryBtnStyle = 'display: inline-block; background: linear-gradient(135deg, #faab41 0%, #f6821f 100%); color: white; text-decoration: none; padding: 16px 32px; border-radius: 14px; font-weight: 700; font-size: 17px; box-shadow: 0 8px 16px rgba(246, 130, 31, 0.2); transition: all 0.3s ease; border: none; cursor: pointer; margin: 10px; outline: none; position: relative; overflow: hidden;';
                    const secondaryBtnStyle = 'display: inline-block; background: #f3f4f6; color: #9ca3af; text-decoration: none; padding: 16px 32px; border-radius: 14px; font-weight: 500; font-size: 16px; transition: all 0.3s ease; border: none; cursor: pointer; margin: 10px; outline: none;';

                    if (lang.toLowerCase().startsWith('zh')) {
                        contentHTML = `
                            <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 40px 20px; text-align: center;">
                                <div style="font-size: 64px; margin-bottom: 20px; animation: shake 2s infinite;"></div>
                                <h2 style="color: white; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0;"> Geographic Restriction</h2>
                            </div>
                            <div style="padding: 40px; text-align: left; line-height: 1.8;">
                                <div style="background: #fdf2f2; border-left: 4px solid #dc2626; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                                    <p style="font-size: 16px; color: #991b1b; margin: 0;">We're unable to provide optimal service in your region. To get the best experience, we strongly recommend switching to specialized solutions maintained by the Iranian developer community.</p>
                                </div>
                                <div class="modal-button-container">
                                    <button id="accept-suggestion" style="${primaryBtnStyle}"> Use BPB-Worker-Panel</button>
                                    <button id="stay-current" style="${secondaryBtnStyle}">Continue with current project</button>
                                </div>
                            </div>
                        `;
                    } else if (lang.toLowerCase().startsWith('en')) {
                        contentHTML = `
                            <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 40px 20px; text-align: center;">
                                <div style="font-size: 64px; margin-bottom: 20px; animation: shake 2s infinite;"></div>
                                <h2 style="color: white; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0;"> Geographic Restriction</h2>
                            </div>
                            <div style="padding: 40px; text-align: left; line-height: 1.8;">
                                <div style="background: #fdf2f2; border-left: 4px solid #dc2626; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                                    <p style="font-size: 16px; color: #991b1b; margin: 0;">We're unable to provide optimal service in your region. To get the best experience, we strongly recommend switching to specialized solutions maintained by the Iranian developer community.</p>
                                </div>
                                <div class="modal-button-container">
                                    <button id="accept-suggestion" style="${primaryBtnStyle}"> Use BPB-Worker-Panel</button>
                                    <button id="stay-current" style="${secondaryBtnStyle}">Continue with current project</button>
                                </div>
                            </div>
                        `;
                    } else {
                        // Default to Persian (IR)
                        contentHTML = `
                            <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 40px 20px; text-align: center;">
                                <div style="font-size: 64px; margin-bottom: 20px; animation: shake 2s infinite;"></div>
                                <h2 style="color: white; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0;"> Geographic Restriction</h2>
                            </div>
                            <div style="padding: 40px; text-align: right; line-height: 1.8; direction: rtl;">
                                <div style="background: #fdf2f2; border-right: 4px solid #dc2626; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                                    <p style="font-size: 16px; color: #991b1b; margin: 0;">We're unable to provide optimal service in your region. To get the best experience, we strongly recommend switching to specialized solutions maintained by the Iranian developer community.</p>
                                </div>
                                <div class="modal-button-container" style="direction: ltr;">
                                    <button id="accept-suggestion" style="${primaryBtnStyle}"> Use BPB-Worker-Panel</button>
                                    <button id="stay-current" style="${secondaryBtnStyle}">Continue with current project</button>
                                </div>
                            </div>
                        `;
                    }

                    modalContent.innerHTML = contentHTML;
                    irModal.classList.add('show');

                    const acceptBtn = document.getElementById('accept-suggestion');
                    const stayBtn = document.getElementById('stay-current');

                    const progressBar = document.createElement('div');
                    progressBar.className = 'btn-countdown-line';
                    acceptBtn.classList.add('btn-tech-upgrade');
                    acceptBtn.appendChild(progressBar);

                    const redirectTimer = setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 8000);

                    acceptBtn.onclick = () => {
                        clearTimeout(redirectTimer);
                        window.location.href = redirectUrl;
                    };

                    stayBtn.onclick = () => {
                        clearTimeout(redirectTimer);
                        irModal.classList.remove('show');
                        enableLogin();
                    };
                } else {
                    // Not IR user
                    enableLogin();
                }
            } catch (error) {
                console.log('Location check failed or timed out:', error);
                // Timeout or error -> treat as not IR
                enableLogin();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const passwordInput = document.getElementById('password');

            errorMsg.classList.add('login-error-hidden');

            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'password=' + encodeURIComponent(password)
                });

                if (response.ok) {
                    const contentType = response.headers.get('content-type');

                    if (contentType && contentType.includes('application/json')) {
                        const data = await response.json();
                        if (data.success) {
                            window.location.href = '/admin';
                        }
                    } else {
                        errorMsg.textContent = 'Incorrect password. Please try again.';
                        errorMsg.classList.remove('login-error-hidden');
                        passwordInput.focus();
                        passwordInput.select();
                    }
                } else {
                    errorMsg.textContent = 'Sign-in failed. Please try again.';
                    errorMsg.classList.remove('login-error-hidden');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Network error. Please check your connection.';
                errorMsg.classList.remove('login-error-hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
            }
        });
    </script>
</body>

</html>
