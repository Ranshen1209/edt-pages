<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>edgetunnel static pages</title>
    <meta http-equiv="refresh" content="0; url=./login/">
    <style>
        :root { color-scheme: light; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f4ed; color: #141413; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; }
        main { max-width: 680px; padding: 40px; border: 1px solid #e8e6dc; border-radius: 32px; background: #faf9f5; box-shadow: 0 22px 70px rgba(20,20,19,.09), 0 0 0 1px #e8e6dc; }
        h1 { margin: 0 0 12px; font-family: Georgia, 'Times New Roman', serif; font-weight: 500; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; }
        p { color: #5e5d59; line-height: 1.6; }
        a { color: #c96442; font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <h1>edgetunnel static pages</h1>
        <p>This repository hosts the customized local UI pages for edgetunnel.</p>
        <p>If you are not redirected automatically, open <a href="./login/">the login page</a>.</p>
    </main>
</body>
</html>
